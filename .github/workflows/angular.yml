name: Angular CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm install

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Test
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build